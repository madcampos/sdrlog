<!doctype html>
<html lang="en" itemscope itemtype="http://schema.org/WebSite">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width,initial-scale=1" />

		<title>Shadowrun Catalog</title>

		<!-- App Metadata -->
		<link rel="icon" href="/icons/favicon.svg" />
		<meta name="theme-color" content="#9400d3" />

		<!-- Social metadata -->
		<meta name="keywords" content="shadowrun, sdr, rpg, books" />

		<meta property="og:title" name="twitter:title" itemprop="name" content="Shadowrun Catalog" />
		<meta
			property="og:description"
			name="description"
			itemprop="description"
			content="An interactive list of Shadowrun published material (books, tabletop, video games, etc.). Information about the items and can be linked to local files."
		/>
		<meta property="og:image" name="twitter:image" itemprop="image" content="https://sdrlog.madcampos.dev/icons/transparent/manifest-icon-512.png" />
		<meta property="og:type" content="website" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:url" content="https://sdrlog.madcampos.dev/" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:dnt" content="on" />

		<meta name="pinterest" content="nopin" description="Pintrest not allowed here!" />

		<!-- Search -->
		<!-- <link rel="search" href="/open-search.xml" type="application/opensearchdescription+xml" title="Shadowrun Catalog"> -->

		<!-- Site configuration -->
		<meta name="referrer" content="no-referrer" />
		<meta name="format-detection" content="telephone=no" />
		<meta name="google" content="notranslate" />
		<link rel="license" href="#copyright" />

		<!-- Changelog -->
		<link rel="alternate" type="application/rss+xml" href="https://sdrlog.madcampos.dev/changelog.rss" title="Changelog (Version History)" />

		<!-- Apple metadata -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		<!-- Styles -->
		<link rel="stylesheet" href="./css/index.css" />
	</head>

	<body class="notranslate" translate="no">
		<top-bar></top-bar>
		<main></main>

		<sdr-loading-screen>
			<template shadowrootmode="open">
				<link rel="stylesheet" href="./components/SdrLoadingScreen/style.css" />
				<img
					src="/images/base-covers/loading-anim.svg"
					width="189"
					height="189"
					alt="Animation of the Shadowrun logo. Showing a profile of a serpent forming the letter &quot;S&quot; in the purple color."
				/>
				<!-- <progress id="load-progress" aria-labelledby="load-text"></progress> -->
				<p id="load-text">Under construction</p>
			</template>
		</sdr-loading-screen>

		<!-- <script src="./components/SdrLoadingScreen/index.ts" type="module"></script> -->

		<svg-defs aria-hidden="true">
			<!-- Glitch Filter -->
			<svg viewBox="0 0 10 10" aria-hidden="true" role="none" width="1" height="1">
				<defs>
					<filter id="small-pixelate-filter">
						<feGaussianBlur result="blurred-image" stdDeviation="1" />
						<feImage
							href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAIAAAACDbGyAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAWSURBVAgdY1ywgOEDAwKxgJhIgFQ+AP/vCNK2s+8LAAAAAElFTkSuQmCC"
							width="3"
							height="3"
						/>
						<feTile result="displacement-map" />
						<feDisplacementMap
							in="blurred-image"
							in2="displacement-map"
							result="pixelated-image"
							scale="8"
							xChannelSelector="R"
							yChannelSelector="G"
						/>
					</filter>
					<filter id="glitch-filter">
						<feTurbulence baseFrequency="0 1.01" numOctaves="32" seed="2" />
						<feMorphology operator="dilate" radius="8" result="glitch-lines" />
						<feDisplacementMap in="SourceGraphic" in2="glitch-lines" scale="32" xChannelSelector="R" yChannelSelector="R" />
						<feOffset dy="-2" />
					</filter>
					<filter id="animated-glitch-filter">
						<feTurbulence baseFrequency="0 2" numOctaves="32">
							<animate attributeName="numOctaves" dur="16s" repeatCount="indefinite" values="8;2;16;2;8;32;8;2;8;16;32;4;2;8;16;64" />
							<animate attributeName="baseFrequency" dur="30s" repeatCount="indefinite" values="0 0.001; 0 0.002" />
							<animate
								additive="sum"
								attributeName="baseFrequency"
								calcMode="discrete"
								dur="60s"
								repeatCount="indefinite"
								values="0 0.001;0 2;0 3;0 0.001;0 0.001;0.001 5;0 2;0 3;0 2;0 0.001;0.5 2;1 0.05;0 0.001;0 0.001;0 4;0 0.001;0.001 3;0 0.1;0 0.001;0 2;0 6;0 2;0 0.001;0.001 1;0 0.001;0 0.001;0 2;0 0.001;"
							/>
							<animate attributeName="seed" calcMode="discrete" dur="120s" repeatCount="indefinite" values="1;2;3;4;5" />
						</feTurbulence>
						<feMorphology operator="dilate" radius="8" result="glitch-lines" />
						<feDisplacementMap in="SourceGraphic" in2="glitch-lines" scale="32" xChannelSelector="R" yChannelSelector="R" />
					</filter>
					<filter id="pixelate-filter">
						<feGaussianBlur result="blurred-image" stdDeviation="8" />
						<feImage
							href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUAAAAFCAIAAAACDbGyAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAAJcEhZcwAADsMAAA7DAcdvqGQAAAAWSURBVAgdY1ywgOEDAwKxgJhIgFQ+AP/vCNK2s+8LAAAAAElFTkSuQmCC"
							width="15"
							height="15"
						/>
						<feTile result="displacement-map" />
						<feDisplacementMap
							in="blurred-image"
							in2="displacement-map"
							result="pixelated-image"
							scale="50"
							xChannelSelector="R"
							yChannelSelector="G"
						/>
						<feOffset dx="-12" dy="-12" />
					</filter>
					<filter id="noise-filter">
						<feGaussianBlur result="blurred-image" stdDeviation="16" />
						<feTurbulence baseFrequency="1.2" numOctaves="10" stitchTiles="stitch" type="fractalNoise" />
						<feColorMatrix type="saturate" values="0" />
						<feComposite in2="blurred-image" operator="in" />
						<feComponentTransfer>
							<feFuncA slope=".7" type="linear" />
						</feComponentTransfer>
					</filter>
				</defs>
			</svg>

			<!-- Liquid (Gl)ass Effect -->
			<svg viewBox="0 0 10 10" aria-hidden="true" role="none" width="1" height="1">
				<defs>
					<filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
						<feTurbulence type="fractalNoise" baseFrequency="0.02 0.02" numOctaves="2" seed="92" />
						<feGaussianBlur stdDeviation="2" result="blurred" />
						<feDisplacementMap in="SourceGraphic" in2="blurred" scale="110" xChannelSelector="R" yChannelSelector="G" />
					</filter>
				</defs>
			</svg>
		</svg-defs>

		<script src="./js/main.ts" type="module"></script>
	</body>
</html>
